server:
  servlet:
    session:
      timeout: 48h
      cookie:
        secure: true
        same-site: lax

spring:
  config:
    import:
      - optional:file:/workspaces/codespaces-blank/stomp/local.env[.properties]
  session:
    redis:
      flush-mode: immediate # save session whenever there are updates
      repository-type: default # redisSessionRepository is the default implementation. however, if you want to be explicit about it, you can set the following property in your application
      namespace: "spring:session"
      
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
  
            redirect-uri: "https://musical-bassoon-4jg7r59p5vqw2p5-8080.app.github.dev/login/oauth2/code/google"

          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}

            redirect-uri: "https://musical-bassoon-4jg7r59p5vqw2p5-8080.app.github.dev/login/oauth2/code/kakao"

            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            
            scope:
              - openid       
              - account_email
              - profile_image

        provider:
          kakao:
            issuer-uri: https://kauth.kakao.com
      